<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'predict' %}">🏠 House Predictor</a>
            <div>
                <a class="btn btn-outline-light btn-sm" href="{% url 'evaluate' %}">Evaluate</a>
                <a class="btn btn-outline-light btn-sm" href="{% url 'history' %}">History</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info">{{ message|safe }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>

</body>
</html>
